name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.2.3)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag and version
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "zip=Signr-${VERSION}.zip" >> "$GITHUB_OUTPUT"

      - name: Select Xcode 26.4
        run: |
          sudo xcode-select -s /Applications/Xcode_26.4.app/Contents/Developer
          xcodebuild -version

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      # Cache ~/.cargo + rust/target so releases stop recompiling idevice/rustls/Plume from
      # scratch each run. Keyed on rust/Cargo.lock; the first run after this still pays full price.
      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Build Rust core into xcframework
        run: ./rust/build-xcframework.sh

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build Signr.app (Release, unsigned)
        run: |
          xcodebuild \
            -project Signr.xcodeproj \
            -scheme Signr \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            -derivedDataPath build \
            ARCHS=arm64 \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Fetch signing toolkit
        uses: actions/checkout@v4
        with:
          repository: RanduSoft/macos-signing
          token: ${{ secrets.SIGNING_PAT }}
          path: .signing

      - name: Sign, notarize and staple
        uses: ./.signing
        with:
          app-path: build/Build/Products/Release/Signr.app
          entitlements: app/Signr.entitlements

      - name: Package .app into a zip
        id: pkg
        run: |
          APP="build/Build/Products/Release/Signr.app"
          test -d "$APP" || { echo "App bundle missing at $APP"; exit 1; }
          ZIP="${{ steps.meta.outputs.zip }}"
          ditto -c -k --keepParent "$APP" "$ZIP"
          SHA=$(shasum -a 256 "$ZIP" | awk '{print $1}')
          echo "$SHA  $ZIP" > checksums.txt
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          ls -la "$ZIP" checksums.txt

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.tag }}
          generate_release_notes: true
          files: |
            ${{ steps.meta.outputs.zip }}
            checksums.txt

      - name: Trigger Homebrew tap update
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.TAP_GITHUB_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: 'rursache',
              repo: 'homebrew-tap',
              workflow_id: 'update-formula.yml',
              ref: 'master',
              inputs: {
                formula: 'signr',
                tag: '${{ steps.meta.outputs.tag }}',
                repository: context.repo.owner + '/' + context.repo.repo
              }
            })
